name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows_amd64
            artifact: fofatoto.exe
            static-libpython: ""
          - os: ubuntu-latest
            platform: linux_amd64
            artifact: fofatoto
            static-libpython: "--static-libpython=yes"
          - os: ubuntu-latest
            platform: linux_arm64
            artifact: fofatoto
            static-libpython: "--static-libpython=yes"
          - os: macos-latest
            platform: macos_amd64
            artifact: fofatoto
            static-libpython: "--static-libpython=yes"
          - os: macos-14
            platform: macos_arm64
            artifact: fofatoto
            static-libpython: "--static-libpython=yes"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install nuitka zstandard

      - name: Build
        run: python -m nuitka --onefile --lto=yes ${{ matrix.static-libpython }} --remove-output --assume-yes-for-downloads --python-flag=no_site,no_docstrings --noinclude-pytest-mode=nofollow --noinclude-setuptools-mode=nofollow --noinclude-unittest-mode=nofollow --noinclude-pydoc-mode=nofollow --noinclude-IPython-mode=nofollow --noinclude-dask-mode=nofollow --noinclude-numba-mode=nofollow --noinclude-default-mode=nofollow --output-dir=dist --output-filename=${{ matrix.artifact }} fofatoto.py

      - uses: actions/upload-artifact@v4
        with:
          name: fofatoto-${{ matrix.platform }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag v1.0.0
          git push origin v1.0.0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare artifacts
        run: |
          cd artifacts
          mv fofatoto-windows_amd64/fofatoto.exe ../fofatoto.exe
          mv fofatoto-linux_amd64/fofatoto ../fofatoto
          mv fofatoto-linux_arm64/fofatoto ../fofatoto_arm64
          mv fofatoto-macos_amd64/fofatoto ../fofatoto_mac
          mv fofatoto-macos_arm64/fofatoto ../fofatoto_mac_arm64
          cd ..
          rm -rf artifacts
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            fofatoto.exe
            fofatoto
            fofatoto_arm64
            fofatoto_mac
            fofatoto_mac_arm64
          body: |
            ## fofatoto v1.0.0

            FOFA 查询工具，支持单次查询和多次查询模式。

            ### 下载

            | 平台 | 架构 | 文件名 |
            |------|------|--------|
            | Windows | amd64 | fofatoto.exe |
            | Linux | amd64 | fofatoto |
            | Linux | arm64 | fofatoto_arm64 |
            | macOS | amd64 | fofatoto_mac |
            | macOS | arm64 (M芯片) | fofatoto_mac_arm64 |

            ### 使用方法

            ```bash
            ./fofatoto "domain=baidu.com"
            ```

            详细使用说明请查看 [README](https://github.com/keyblues/fofatoto/blob/main/README.md)
          tag_name: v1.0.0
