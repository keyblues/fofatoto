name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install nuitka zstandard

      - name: Build
        run: python -m nuitka --onefile --lto=yes --remove-output --assume-yes-for-downloads --python-flag=no_site,no_docstrings --noinclude-pytest-mode=nofollow --noinclude-setuptools-mode=nofollow --noinclude-unittest-mode=nofollow --noinclude-pydoc-mode=nofollow --noinclude-IPython-mode=nofollow --noinclude-dask-mode=nofollow --noinclude-numba-mode=nofollow --noinclude-default-mode=nofollow --output-dir=dist --output-filename=fofatoto.exe fofatoto.py

      - uses: actions/upload-artifact@v4
        with:
          name: fofatoto-windows_amd64
          path: dist/fofatoto.exe

  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux_amd64
            arch: x86_64
          - platform: linux_arm64
            arch: aarch64

    runs-on: ubuntu-latest
    container:
      image: debian:bookworm-slim
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update -qq && apt-get install -y -qq \
            python3 python3-dev python3-pip \
            gcc g++ make patchelf wget \
            zstd \
            > /dev/null 2>&1 && rm -rf /var/lib/apt/lists/*

      - name: Install nuitka
        run: pip3 install --break-system-packages nuitka zstandard

      - name: Build
        run: python3 -m nuitka --onefile --lto=yes --static-libpython=yes --remove-output --assume-yes-for-downloads --python-flag=no_site,no_docstrings --noinclude-pytest-mode=nofollow --noinclude-setuptools-mode=nofollow --noinclude-unittest-mode=nofollow --noinclude-pydoc-mode=nofollow --noinclude-IPython-mode=nofollow --noinclude-dask-mode=nofollow --noinclude-numba-mode=nofollow --noinclude-default-mode=nofollow --output-dir=dist --output-filename=fofatoto fofatoto.py

      - name: Copy artifact
        run: cp dist/fofatoto /tmp/fofatoto

      - uses: actions/upload-artifact@v4
        with:
          name: fofatoto-${{ matrix.platform }}
          path: /tmp/fofatoto

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos_amd64
            runner: macos-latest
          - platform: macos_arm64
            runner: macos-14

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install nuitka zstandard

      - name: Build
        run: python -m nuitka --onefile --lto=yes --static-libpython=yes --remove-output --assume-yes-for-downloads --python-flag=no_site,no_docstrings --noinclude-pytest-mode=nofollow --noinclude-setuptools-mode=nofollow --noinclude-unittest-mode=nofollow --noinclude-pydoc-mode=nofollow --noinclude-IPython-mode=nofollow --noinclude-dask-mode=nofollow --noinclude-numba-mode=nofollow --noinclude-default-mode=nofollow --output-dir=dist --output-filename=fofatoto fofatoto.py

      - uses: actions/upload-artifact@v4
        with:
          name: fofatoto-${{ matrix.platform }}
          path: dist/fofatoto

  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag ${{ github.ref_name }}
          git push origin ${{ github.ref_name }}

      - name: Extract changelog for release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="## v$VERSION" '
            index($0, ver)==1 { found=1; next }
            found && /^## v/ { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            printf '请查看提交记录获取更新详情。\n' > release_notes.md
          fi
          echo "===== release notes ====="
          cat release_notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare artifacts
        run: |
          cd artifacts
          mv fofatoto-windows_amd64/fofatoto.exe ../fofatoto.exe
          mv fofatoto-linux_amd64/fofatoto ../fofatoto
          mv fofatoto-linux_arm64/fofatoto ../fofatoto_arm64
          mv fofatoto-macos_amd64/fofatoto ../fofatoto_mac
          mv fofatoto-macos_arm64/fofatoto ../fofatoto_mac_arm64
          cd ..
          rm -rf artifacts
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: fofatoto ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            fofatoto.exe
            fofatoto
            fofatoto_arm64
            fofatoto_mac
            fofatoto_mac_arm64
          tag_name: ${{ github.ref_name }}
