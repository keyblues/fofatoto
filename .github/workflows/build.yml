name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install nuitka zstandard

      - name: Verify zstandard
        run: |
          pip show zstandard
          python -c "import zstandard; print('zstandard version:', zstandard.__version__)"

      - name: Build Windows executable (amd64)
        run: |
          python -m nuitka --onefile --lto=yes --remove-output --assume-yes-for-downloads --python-flag=no_site,no_docstrings --noinclude-pytest-mode=nofollow --noinclude-setuptools-mode=nofollow --noinclude-unittest-mode=nofollow --noinclude-pydoc-mode=nofollow --noinclude-IPython-mode=nofollow --noinclude-dask-mode=nofollow --noinclude-numba-mode=nofollow --noinclude-default-mode=nofollow --output-filename=fofatoto.exe fofatoto.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fofatoto-windows-amd64
          path: fofatoto.exe

  build-windows-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install nuitka zstandard
      - name: Build Windows executable (arm64)
        run: |
          python -m nuitka --onefile --lto=yes --remove-output --assume-yes-for-downloads --python-flag=no_site,no_docstrings --noinclude-pytest-mode=nofollow --noinclude-setuptools-mode=nofollow --noinclude-unittest-mode=nofollow --noinclude-pydoc-mode=nofollow --noinclude-IPython-mode=nofollow --noinclude-dask-mode=nofollow --noinclude-numba-mode=nofollow --noinclude-default-mode=nofollow --output-filename=fofatoto.exe fofatoto.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fofatoto-windows-arm64
          path: fofatoto.exe

  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install nuitka zstandard
      - name: Verify zstandard
        run: |
          pip show zstandard
          python -c "import zstandard; print('zstandard version:', zstandard.__version__)"

      - name: Build Linux executable (amd64)
        run: |
          python -m nuitka --onefile --lto=yes --remove-output --assume-yes-for-downloads --python-flag=no_site,no_docstrings --noinclude-pytest-mode=nofollow --noinclude-setuptools-mode=nofollow --noinclude-unittest-mode=nofollow --noinclude-pydoc-mode=nofollow --noinclude-IPython-mode=nofollow --noinclude-dask-mode=nofollow --noinclude-numba-mode=nofollow --noinclude-default-mode=nofollow --output-filename=fofatoto fofatoto.py 2>&1 | tee build.log
          grep -i "compression\|zstd\|zstandard" build.log || echo "No compression info found"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fofatoto-linux-amd64
          path: fofatoto

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install nuitka zstandard
      - name: Build Linux executable (arm64)
        run: |
          python -m nuitka --onefile --lto=yes --remove-output --assume-yes-for-downloads --python-flag=no_site,no_docstrings --noinclude-pytest-mode=nofollow --noinclude-setuptools-mode=nofollow --noinclude-unittest-mode=nofollow --noinclude-pydoc-mode=nofollow --noinclude-IPython-mode=nofollow --noinclude-dask-mode=nofollow --noinclude-numba-mode=nofollow --noinclude-default-mode=nofollow --output-filename=fofatoto fofatoto.py 2>&1 | tee build.log
          grep -i "compression\|zstd\|zstandard" build.log || echo "No compression info found"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fofatoto-linux-arm64
          path: fofatoto

  build-macos-amd64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install nuitka zstandard
      - name: Build macOS executable (amd64)
        run: |
          python -m nuitka --onefile --lto=yes --remove-output --assume-yes-for-downloads --python-flag=no_site,no_docstrings --noinclude-pytest-mode=nofollow --noinclude-setuptools-mode=nofollow --noinclude-unittest-mode=nofollow --noinclude-pydoc-mode=nofollow --noinclude-IPython-mode=nofollow --noinclude-dask-mode=nofollow --noinclude-numba-mode=nofollow --noinclude-default-mode=nofollow --output-filename=fofatoto fofatoto.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fofatoto-macos-amd64
          path: fofatoto

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install nuitka zstandard
      - name: Build macOS executable (arm64)
        run: |
          python -m nuitka --onefile --lto=yes --remove-output --assume-yes-for-downloads --python-flag=no_site,no_docstrings --noinclude-pytest-mode=nofollow --noinclude-setuptools-mode=nofollow --noinclude-unittest-mode=nofollow --noinclude-pydoc-mode=nofollow --noinclude-IPython-mode=nofollow --noinclude-dask-mode=nofollow --noinclude-numba-mode=nofollow --noinclude-default-mode=nofollow --output-filename=fofatoto fofatoto.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fofatoto-macos-arm64
          path: fofatoto

  release:
    needs: [build-windows-amd64, build-windows-arm64, build-linux-amd64, build-linux-arm64, build-macos-amd64, build-macos-arm64]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag v1.0.0
          git push origin v1.0.0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename
        run: |
          mv artifacts/fofatoto-windows-amd64/fofatoto.exe artifacts/fofatoto.exe
          mv artifacts/fofatoto-windows-arm64/fofatoto.exe artifacts/fofatoto_arm64.exe
          mv artifacts/fofatoto-linux-amd64/fofatoto artifacts/fofatoto
          mv artifacts/fofatoto-linux-arm64/fofatoto artifacts/fofatoto_arm64
          mv artifacts/fofatoto-macos-amd64/fofatoto artifacts/fofatoto_mac
          mv artifacts/fofatoto-macos-arm64/fofatoto artifacts/fofatoto_mac_arm64

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/fofatoto.exe
            artifacts/fofatoto_arm64.exe
            artifacts/fofatoto
            artifacts/fofatoto_arm64
            artifacts/fofatoto_mac
            artifacts/fofatoto_mac_arm64
          body: |
            ## fofatoto v1.0.0

            FOFA 查询工具，支持单次查询和多次查询模式。

            ### 下载

            | 平台 | 架构 | 文件名 |
            |------|------|--------|
            | Windows | amd64 | fofatoto.exe |
            | Windows | arm64 | fofatoto_arm64.exe |
            | Linux | amd64 | fofatoto |
            | Linux | arm64 | fofatoto_arm64 |
            | macOS | amd64 | fofatoto_mac |
            | macOS | arm64 (M芯片) | fofatoto_mac_arm64 |

            ### 使用方法

            ```bash
            ./fofatoto "domain=baidu.com"
            ```

            详细使用说明请查看 [README](https://github.com/keyblues/fofatoto/blob/main/README.md)
          tag_name: v1.0.0
