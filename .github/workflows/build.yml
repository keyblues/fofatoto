name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install nuitka zstandard
      - name: Build Windows executable (amd64)
        run: |
          python -m nuitka --onefile --lto=yes --remove-output --assume-yes-for-downloads --python-flag=no_docstrings --noinclude-pytest-mode=nofollow --noinclude-setuptools-mode=nofollow --noinclude-unittest-mode=nofollow --noinclude-pydoc-mode=nofollow --windows-disable-console --output-filename=fscan.exe fofatoto.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fscan-windows-amd64
          path: fscan.exe

  build-windows-arm64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install nuitka zstandard
      - name: Build Windows executable (arm64)
        run: |
          python -m nuitka --onefile --lto=yes --remove-output --assume-yes-for-downloads --python-flag=no_docstrings --noinclude-pytest-mode=nofollow --noinclude-setuptools-mode=nofollow --noinclude-unittest-mode=nofollow --noinclude-pydoc-mode=nofollow --windows-disable-console --output-filename=fscan.exe fofatoto.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fscan-windows-arm64
          path: fscan.exe

  build-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install nuitka zstandard
      - name: Build Linux executable (amd64)
        run: |
          python -m nuitka --onefile --lto=yes --remove-output --assume-yes-for-downloads --python-flag=no_docstrings --noinclude-pytest-mode=nofollow --noinclude-setuptools-mode=nofollow --noinclude-unittest-mode=nofollow --noinclude-pydoc-mode=nofollow --output-filename=fscan fofatoto.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fscan-linux-amd64
          path: fscan

  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install nuitka zstandard
      - name: Build Linux executable (arm64)
        run: |
          python -m nuitka --onefile --lto=yes --remove-output --assume-yes-for-downloads --python-flag=no_docstrings --noinclude-pytest-mode=nofollow --noinclude-setuptools-mode=nofollow --noinclude-unittest-mode=nofollow --noinclude-pydoc-mode=nofollow --output-filename=fscan fofatoto.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fscan-linux-arm64
          path: fscan

  build-macos-amd64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install nuitka zstandard
      - name: Build macOS executable (amd64)
        run: |
          python -m nuitka --onefile --lto=yes --remove-output --assume-yes-for-downloads --python-flag=no_docstrings --noinclude-pytest-mode=nofollow --noinclude-setuptools-mode=nofollow --noinclude-unittest-mode=nofollow --noinclude-pydoc-mode=nofollow --output-filename=fscan fofatoto.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fscan-macos-amd64
          path: fscan

  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install nuitka zstandard
      - name: Build macOS executable (arm64)
        run: |
          python -m nuitka --onefile --lto=yes --remove-output --assume-yes-for-downloads --python-flag=no_docstrings --noinclude-pytest-mode=nofollow --noinclude-setuptools-mode=nofollow --noinclude-unittest-mode=nofollow --noinclude-pydoc-mode=nofollow --output-filename=fscan fofatoto.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fscan-macos-arm64
          path: fscan

  release:
    needs: [build-windows-amd64, build-windows-arm64, build-linux-amd64, build-linux-arm64, build-macos-amd64, build-macos-arm64]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag v1.0.0
          git push origin v1.0.0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename
        run: |
          mv artifacts/fscan-windows-amd64/fscan.exe artifacts/fscan.exe
          mv artifacts/fscan-windows-arm64/fscan.exe artifacts/fscan_arm64.exe
          mv artifacts/fscan-linux-amd64/fscan artifacts/fscan
          mv artifacts/fscan-linux-arm64/fscan artifacts/fscan_arm64
          mv artifacts/fscan-macos-amd64/fscan artifacts/fscan_mac
          mv artifacts/fscan-macos-arm64/fscan artifacts/fscan_mac_arm64

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/fscan.exe
            artifacts/fscan_arm64.exe
            artifacts/fscan
            artifacts/fscan_arm64
            artifacts/fscan_mac
            artifacts/fscan_mac_arm64
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
