name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-amd64
            artifact: fofatoto.exe
          - os: ubuntu-latest
            name: linux-amd64
            artifact: fofatoto
          - os: ubuntu-latest
            name: linux-arm64
            artifact: fofatoto
          - os: macos-latest
            name: macos-amd64
            artifact: fofatoto
          - os: macos-14
            name: macos-arm64
            artifact: fofatoto

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install nuitka zstandard

      - name: Build
        run: |
          python -m nuitka --onefile --lto=yes --remove-output \
            --assume-yes-for-downloads \
            --python-flag=no_site,no_docstrings \
            --noinclude-pytest-mode=nofollow \
            --noinclude-setuptools-mode=nofollow \
            --noinclude-unittest-mode=nofollow \
            --noinclude-pydoc-mode=nofollow \
            --noinclude-IPython-mode=nofollow \
            --noinclude-dask-mode=nofollow \
            --noinclude-numba-mode=nofollow \
            --noinclude-default-mode=nofollow \
            --output-filename=${{ matrix.artifact }} fofatoto.py

      - uses: actions/upload-artifact@v4
        with:
          name: fofatoto-${{ matrix.name }}
          path: ${{ matrix.artifact }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag v1.0.0
          git push origin v1.0.0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare artifacts
        run: |
          cd artifacts
          mv fofatoto fofatoto_linux_amd64 2>/dev/null || true
          mv fofatoto-1 fofatoto_linux_arm64 2>/dev/null || true
          mv fofatoto-2 fofatoto_macos_amd64 2>/dev/null || true
          mv fofatoto-3 fofatoto_macos_arm64 2>/dev/null || true
          for f in fofatoto*.exe; do
            [ -f "$f" ] && mv "$f" "${f%.exe}_windows_amd64.exe"
          done
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          body: |
            ## fofatoto v1.0.0

            FOFA 查询工具，支持单次查询和多次查询模式。

            ### 下载

            | 平台 | 架构 | 文件名 |
            |------|------|--------|
            | Windows | amd64 | fofatoto_windows_amd64.exe |
            | Linux | amd64 | fofatoto_linux_amd64 |
            | Linux | arm64 | fofatoto_linux_arm64 |
            | macOS | amd64 | fofatoto_macos_amd64 |
            | macOS | arm64 (M芯片) | fofatoto_macos_arm64 |

            ### 使用方法

            ```bash
            ./fofatoto "domain=baidu.com"
            ```

            详细使用说明请查看 [README](https://github.com/keyblues/fofatoto/blob/main/README.md)
          tag_name: v1.0.0
